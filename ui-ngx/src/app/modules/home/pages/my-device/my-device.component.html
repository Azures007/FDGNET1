<div class="my_device_container">

    <div class="search_form">
        <div class="search_item">
            <div class="label">设备名称:</div>
            <input type="text" [(ngModel)]="searchFormGroup.value.deviceName">
        </div>
        <div class="search_item">
            <div class="label">设备编号:</div>
            <input type="text" [(ngModel)]="searchFormGroup.value.deviceNumber">
        </div>
        <div class="search_item">
            <div class="label">状态:</div>
            <select required [(ngModel)]="searchFormGroup.value.enabled">
                <option value="">全部</option>
                <option value="0">启用</option>
                <option value="1">禁用</option>
            </select>
        </div>
        <button class="search_btn" (click)="getTableData()">
            <mat-icon>search</mat-icon> 查询
        </button>
        <button class="search_btn" (click)="reset()">
          <mat-icon>clear</mat-icon> 重置
        </button>
        <button *ngIf="set.has('/mydevice/down')" class="search_btn" (click)="hadnleExportTable()">
            <mat-icon svgIcon="daochu" aria-hidden="false" aria-label="Example thumbs up SVG icon"></mat-icon>
            导出
        </button>
    </div>

    <div class="info_container">

        <div class="info_title">
            <div class="btn_list">
                <button  *ngIf="set.has('/mydevice/add')" class="add_btn btn_color_primary" (click)="showAddVisibilly()">
                    <mat-icon>add</mat-icon> 新增设备
                </button>

                <button *ngIf="set.has('/mydevice/up')" class="add_btn btn_color_primary" (click)="handleUploadData()">
                    <mat-icon svgIcon="daoru" aria-hidden="false" aria-label="Example thumbs up SVG icon"></mat-icon>
                     导入
                </button>
            </div>
            <div class="info_tip">总共<span class="text_color_primary">{{total}}</span>个设备</div>
        </div>

        <div class="table_container">
            <table mat-table [dataSource]="dataSource" class="mat-elevation-z8">

                <ng-container matColumnDef="deviceId">
                    <th mat-header-cell *matHeaderCellDef> 序号 </th>
                    <td mat-cell *matCellDef="let element;index as i">{{i+1}}</td>
                </ng-container>


                <ng-container matColumnDef="deviceName">
                    <th mat-header-cell *matHeaderCellDef> 设备名称 </th>
                    <td mat-cell *matCellDef="let element"> {{element.deviceName}} </td>
                </ng-container>


                <ng-container matColumnDef="deviceNumber">
                    <th mat-header-cell *matHeaderCellDef> 设备编号 </th>
                    <td mat-cell *matCellDef="let element"> {{element.deviceNumber}} </td>
                </ng-container>


                <ng-container matColumnDef="belongProcessId">
                    <th mat-header-cell *matHeaderCellDef> 所属工序 </th>
                    <td mat-cell *matCellDef="let element"> {{element.belongProcessId?handleHash(0,element.belongProcessId):'未绑定'}} </td>
                </ng-container>
                <ng-container matColumnDef="pkOrg">
                    <th mat-header-cell *matHeaderCellDef> 基地 </th>
                    <td mat-cell *matCellDef="let element">  {{getOrgName(element.pkOrg)}} </td>
                </ng-container>

                <ng-container matColumnDef="note">
                    <th mat-header-cell *matHeaderCellDef> 备注 </th>
                    <td mat-cell *matCellDef="let element"> {{element.note}} </td>
                </ng-container>

                <ng-container matColumnDef="enabled">
                    <th mat-header-cell *matHeaderCellDef> 状态 </th>
                    <td mat-cell *matCellDef="let element" [ngClass]="{'enabled':element.enabled == 0,'disabled':element.enabled == 1}"> {{element.enabled == 0?"启用":"禁用"}} </td>

                </ng-container>

                <ng-container matColumnDef="customColumn1">
                    <th mat-header-cell *matHeaderCellDef> 操作 </th>
                    <td mat-cell *matCellDef="let element">
                        <button *ngIf="set.has('/mydevice/edit')" class="mini_btn edit_btn" (click)="lookDia(element,0)">编辑</button>
                        <button class="mini_btn enter_btn" (click)="enterDia(element,0)"
                            *ngIf="element.enabled == 1 && set.has('/mydevice/enable')">启用</button>
                        <button class="mini_btn disable_btn" (click)="enterDia(element,1)"
                            *ngIf="element.enabled == 0 && set.has('/mydevice/disable')">禁用</button>
                        <button *ngIf="set.has('/mydevice/detail')" class="mini_btn look_btn" (click)="lookDia(element,1)">查看</button>
                        <button class="mini_btn del_btn" (click)="delDia(element)"
                            *ngIf="element.enabled == 1 && set.has('/mydevice/del')">删除</button>
                    </td>
                </ng-container>


                <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
            </table>
        </div>
    </div>

    <div class="footer">
        <mat-paginator [length]="total" [pageSize]="searchFormGroup.value.size" [pageSizeOptions]="pageSizeOptions"
            aria-label="选择要跳转的页面" (page)="getNotices($event)">
        </mat-paginator>
    </div>
</div>
