<div class="menu_admin_container">
    <div class="left">
        <mat-tree [dataSource]="dataSource" [treeControl]="treeControl" class="example-tree">
            <mat-tree-node *matTreeNodeDef="let node" (click)="choseNode(node, $event)" matTreeNodeToggle>
                <div [ngClass]="{ 'classify-tree-node-selected': node.select }">
                    {{node.menuName}}
                </div>
            </mat-tree-node>
            <mat-nested-tree-node *matTreeNodeDef="let node; when: hasChild" (click)="choseNode(node, $event)">
                <div class="mat-tree-node">
                    <button mat-icon-button matTreeNodeToggle [attr.aria-label]="'Toggle ' + node.menuName">
                        <mat-icon class="mat-icon-rtl-mirror">
                            {{treeControl.isExpanded(node) ? 'expand_more' : 'chevron_right'}}
                        </mat-icon>
                    </button>
                    <div [ngClass]="{ 'classify-tree-node-selected': node.select }">
                        {{node.menuName}}
                    </div>
                </div>
                <div [class.example-tree-invisible]="!treeControl.isExpanded(node)" role="group">
                    <ng-container matTreeNodeOutlet></ng-container>
                </div>
            </mat-nested-tree-node>
        </mat-tree>
    </div>
    <div class="right">
      <div class="search_form">
        <div class="search_item">
            <div class="label">菜单名称:</div>
            <input type="text" [(ngModel)]="searchFormGroup.value.menuName">
        </div>
        <button class="search_btn" (click)="getTableData()" style="margin-right: 10px;">
            <mat-icon>search</mat-icon> 查询
        </button>
        <button class="search_btn" (click)="reset()">
            <mat-icon>refresh</mat-icon> 重置
        </button>

      </div>
        <div class="info_container">
            <div class="info_title">
                <div class="btn_list">
                    <button class="add_btn btn_color_primary" (click)="showAddVisibilly({})">
                        <mat-icon>add</mat-icon> 新增菜单
                    </button>
                </div>
                <div class="info_tip">总共<span class="text_color_primary">{{total}}</span>个菜单</div>
            </div>
            <div class="table_container">
                <table mat-table [dataSource]="tableDataSource" class="mat-elevation-z8">
                    <!--- Note that these columns can be defined in any order.
                          The actual rendered columns are set as a property on the row definition" -->

                    <!-- Name Column -->
                    <ng-container matColumnDef="menuId">
                        <th mat-header-cell *matHeaderCellDef>
                            菜单ID </th>
                        <td mat-cell *matCellDef="let element"> {{element.menuId}} </td>
                    </ng-container>

                    <ng-container matColumnDef="menuName">
                        <th mat-header-cell *matHeaderCellDef>
                            菜单名称 </th>
                        <td mat-cell *matCellDef="let element"> {{element.menuName}} </td>
                    </ng-container>

                    <ng-container matColumnDef="parentId">
                        <th mat-header-cell *matHeaderCellDef>
                            父菜单 </th>
                        <td mat-cell *matCellDef="let element"> {{element.parentId}} </td>
                    </ng-container>

                    <ng-container matColumnDef="flag">
                        <th mat-header-cell *matHeaderCellDef>
                            类型 </th>
                        <td mat-cell *matCellDef="let element"> {{typeList[element.flag]}} </td>
                    </ng-container>

                    <ng-container matColumnDef="path">
                        <th mat-header-cell *matHeaderCellDef>
                            URL </th>
                        <td mat-cell *matCellDef="let element"> {{element.path}} </td>
                    </ng-container>

                    <ng-container matColumnDef="createdTime">
                        <th mat-header-cell *matHeaderCellDef>
                            创建时间 </th>
                        <td mat-cell *matCellDef="let element"> {{element.createdTime}} </td>
                    </ng-container>

                    <ng-container matColumnDef="sort">
                        <th mat-header-cell *matHeaderCellDef>
                            排序 </th>
                        <td mat-cell *matCellDef="let element"> {{element.sort}} </td>
                    </ng-container>

                    <ng-container matColumnDef="br">
                        <th mat-header-cell *matHeaderCellDef>
                            备注 </th>
                        <td mat-cell *matCellDef="let element"> {{element.br}} </td>
                    </ng-container>

                    <ng-container matColumnDef="enabled">
                        <th mat-header-cell *matHeaderCellDef>
                            状态 </th>
                        <td mat-cell *matCellDef="let element"
                            [ngClass]="{'enabled':element.enabled == 1,'disabled':element.enabled == 0}">
                            {{element.enabled == 1?"启用":"禁用"}} </td>
                    </ng-container>

                    <ng-container matColumnDef="customColumn1">
                        <th mat-header-cell *matHeaderCellDef>
                            操作 </th>
                        <td mat-cell *matCellDef="let element">
                            <button class="mini_btn look_btn" (click)="handleEvent(element,'details')">查看</button>
                            <button class="mini_btn edit_btn" (click)="handleEvent(element,'edit')">编辑</button>
                            <button class="mini_btn enter_btn" (click)="enterDia(element,1)"
                                *ngIf="element.enabled == 0">启用</button>
                            <button class="mini_btn disable_btn" (click)="enterDia(element,0)"
                                *ngIf="element.enabled == 1">禁用</button>
                            <button class="mini_btn del_btn" (click)="delDia(element)"
                                *ngIf="element.enabled == 0">删除</button>
                        </td>
                    </ng-container>



                    <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></tr>
                    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
                </table>
            </div>
            <div class="footer">
                <mat-paginator [length]="total" [pageSize]="searchFormGroup.value.size"
                    [pageSizeOptions]="pageSizeOptions" aria-label="选择要跳转的页面" (page)="getNotices($event)">
                </mat-paginator>
            </div>
        </div>


    </div>
</div>
