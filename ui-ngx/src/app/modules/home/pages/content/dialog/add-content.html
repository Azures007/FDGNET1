<div class="title">
  {{modalTitle}}
  <span class="close_icon" (click)="addDialogClose()"><mat-icon>clear</mat-icon></span>
</div>
<form [formGroup]="dataForm" class="content page-container">
  <div class="row-block">
    <label class="label"><span class="red-star">*</span>产品名称:</label>
    <mat-form-field class="example-full-width" appearance="fill">
      <div class="relative">
        <input autocomplete="off" class="input" readonly formControlName="materialName" type="text" matInput placeholder="请选择产品">
        <span class="absolute" (click)="selectProduct()" *ngIf="formType !== 'details'">选择</span>
      </div>
      <mat-error *ngIf="dataForm.hasError('required','materialName')">
        产品名称为<strong>必填</strong>
      </mat-error>
    </mat-form-field>
  </div>
  <div class="row-block">
    <label class="label">产品编码:</label>
    <mat-form-field class="example-full-width" appearance="fill">
      <input autocomplete="off" class="input" readonly formControlName="materialCode" type="text" matInput placeholder="请选择产品">
    </mat-form-field>
  </div>
  <div class="row-block">
    <label class="label">规格:</label>
    <mat-form-field class="example-full-width" appearance="fill">
      <input autocomplete="off" class="input" readonly formControlName="materialModel" type="text" matInput placeholder="请选择产品">
    </mat-form-field>
  </div>
  <div class="row-block">
    <label class="label"><span class="red-star">*</span>下限值(g):</label>
    <mat-form-field class="example-full-width" appearance="fill">
      <input autocomplete="off" class="input" formControlName="lowerLimit" type="text" matInput placeholder="请输入下限值">
      <mat-error *ngIf="dataForm.hasError('required','lowerLimit')">
        下限值为<strong>必填</strong>
      </mat-error>
      <mat-error *ngIf="dataForm.hasError('pattern','lowerLimit')">
        下限值为<strong>数字</strong>
      </mat-error>

    </mat-form-field>
  </div>
  <div class="row-block">
    <label class="label"><span class="red-star">*</span>上限值(g):</label>
    <mat-form-field class="example-full-width" appearance="fill">
      <input autocomplete="off" class="input" formControlName="upperLimit" type="text" matInput placeholder="请输入上限值">
      <mat-error *ngIf="dataForm.hasError('required','upperLimit')">
        上限值为<strong>必填</strong>
      </mat-error>
      <mat-error *ngIf="dataForm.hasError('pattern','upperLimit')">
        上限值为<strong>数字</strong>
      </mat-error>

    </mat-form-field>
  </div>

  <div class="row-block">
    <div class="label"><span class="red-star">*</span>状态:</div>
    <mat-form-field appearance="fill" class="select">
      <mat-select formControlName="status">
        <mat-option *ngFor="let item of status" [value]="item.value">
          {{item.label}}
        </mat-option>
      </mat-select>
      <mat-error *ngIf="dataForm.hasError('required','status')">
        请选择<strong>状态</strong>
      </mat-error>
    </mat-form-field>
  </div>


</form>
<div class="footer">
  <button *ngIf="formType !== 'details'" (click)="submit()" mat-raised-button color="primary" class="search-btn btn">
    <mat-icon class="material-icons svgIcon">done</mat-icon>
    <span>提交</span>
  </button>

  <button *ngIf="formType === 'details'" (click)="addDialogClose()" mat-raised-button color="primary"
    class="search-btn btn">
    <mat-icon class="material-icons svgIcon">done</mat-icon>
    <span>关闭</span>
  </button>
</div>
