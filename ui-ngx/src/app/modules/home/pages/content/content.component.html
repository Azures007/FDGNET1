<div class="my_device_container">

  <div class="search_form">
    <div class="search_item">
      <div class="label">产品名称:</div>
      <input type="text" [(ngModel)]="searchFormGroup.value.materialName">
    </div>
    <div class="search_item">
      <div class="label">产品编码:</div>
      <input type="text" [(ngModel)]="searchFormGroup.value.materialCode">
    </div>
    <div class="search_item">
      <div class="label">规格:</div>
      <input type="text" [(ngModel)]="searchFormGroup.value.materialModel">
    </div>
    <div class="search_item">
      <div class="label">状态:</div>
      <select required [(ngModel)]="searchFormGroup.value.status">
        <option value="">全部</option>
        <option value="1">启用</option>
        <option value="0">禁用</option>
      </select>
    </div>

    <button class="search_btn" (click)="getTableData()">
      <mat-icon>search</mat-icon> 查询
    </button>
    <button class="search_btn" (click)="reset()">
      <mat-icon>refresh</mat-icon> 重置
    </button>
    <!-- <button class="search_btn" (click)="getTableData()">
            <mat-icon svgIcon="daochu" aria-hidden="false" aria-label="Example thumbs up SVG icon"></mat-icon>
            导出
        </button> -->
  </div>

  <div class="info_container">

    <div class="info_title">
      <div class="btn_list">
        <button class="add_btn btn_color_primary" (click)="showAddVisibilly()">
          <mat-icon>add</mat-icon> 新增
        </button>
      </div>
    </div>

    <div class="table_container">
      <table mat-table [dataSource]="dataSource" class="mat-elevation-z8">

        <ng-container matColumnDef="no">
          <th mat-header-cell *matHeaderCellDef> 序号 </th>
          <td mat-cell *matCellDef="let element;index as i">{{i+1}}</td>
        </ng-container>


        <ng-container matColumnDef="materialName">
          <th mat-header-cell *matHeaderCellDef> 产品名称 </th>
          <td mat-cell *matCellDef="let element"> {{element.materialName}} </td>
        </ng-container>


        <ng-container matColumnDef="materialCode">
          <th mat-header-cell *matHeaderCellDef> 产品编码 </th>
          <td mat-cell *matCellDef="let element"> {{element.materialCode}} </td>
        </ng-container>


        <ng-container matColumnDef="materialModel">
          <th mat-header-cell *matHeaderCellDef> 规格 </th>
          <td mat-cell *matCellDef="let element"> {{element.materialModel}} </td>
        </ng-container>

        <ng-container matColumnDef="lowerLimit">
          <th mat-header-cell *matHeaderCellDef> 下限值(g) </th>
          <td mat-cell *matCellDef="let element"> {{element.lowerLimit}} </td>
        </ng-container>

        <ng-container matColumnDef="upperLimit">
          <th mat-header-cell *matHeaderCellDef> 上限值(g) </th>
          <td mat-cell *matCellDef="let element"> {{element.upperLimit}} </td>
        </ng-container>
        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef> 状态 </th>
          <td mat-cell *matCellDef="let element"
            [ngClass]="{'enabled':element.status == 1,'disabled':element.status == 0}">
            {{element.status == 1?"启用":"禁用"}} </td>

        </ng-container>

        <ng-container matColumnDef="customColumn1">
          <th mat-header-cell *matHeaderCellDef> 操作 </th>
          <td mat-cell *matCellDef="let element">
            <button class="mini_btn edit_btn" (click)="lookDia(element,0)">编辑</button>

            <button class="mini_btn enter_btn" (click)="enterDia(element,1)" *ngIf="element.status == 0">启用</button>

            <button class="mini_btn disable_btn" (click)="enterDia(element,0)" *ngIf="element.status == 1">禁用</button>

            <button class="mini_btn look_btn" (click)="lookDia(element,1)">查看</button>


            <button class="mini_btn del_btn" (click)="delDia(element)" *ngIf="element.status == 0">删除</button>

          </td>
        </ng-container>


        <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>
    </div>
  </div>

  <div class="footer">
    <mat-paginator [length]="total" [pageSize]="searchFormGroup.value.size" [pageSizeOptions]="pageSizeOptions"
      aria-label="选择要跳转的页面" (page)="getNotices($event)">
    </mat-paginator>
  </div>
</div>
