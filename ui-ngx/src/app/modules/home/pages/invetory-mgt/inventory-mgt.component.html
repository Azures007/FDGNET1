<div class="role_container">

    <div class="search_form">
        <div class="search_item">
            <div class="label">仓库名称:</div>
            <input type="text" [(ngModel)]="searchFormGroup.value.warehouseName">
        </div>
        <div class="search_item">
            <div class="label">物料名称:</div>
            <input type="text" [(ngModel)]="searchFormGroup.value.materialName">
        </div>
        <div class="search_item">
            <div class="label">规格:</div>
            <input type="text" [(ngModel)]="searchFormGroup.value.spec">
        </div>
        <button class="search_btn" (click)="getTableData()" style="margin-right: 10px;">
            <mat-icon>search</mat-icon> 查询
        </button>
        <button class="search_btn" (click)="reset()">
            <mat-icon>clear</mat-icon> 重置
        </button>
    </div>

    <div class="info_container">

        <div class="table_container">
            <table mat-table [dataSource]="dataSource" class="mat-elevation-z8">
                <!--- Note that these columns can be defined in any order.
                      The actual rendered columns are set as a property on the row definition" -->
                <!-- Position Column -->
                <ng-container matColumnDef="no">
                    <th mat-header-cell *matHeaderCellDef> 序号 </th>
                    <td mat-cell *matCellDef="let element;index as i"> {{i+1}} </td>
                </ng-container>

                <!-- Name Column -->
                <ng-container matColumnDef="warehouseName">
                    <th mat-header-cell *matHeaderCellDef> 仓库名称 </th>
                    <td mat-cell *matCellDef="let element"> {{element.warehouseName}} </td>
                </ng-container>

                <!-- Symbol Column -->
                <ng-container matColumnDef="warehouseCode">
                    <th mat-header-cell *matHeaderCellDef> 仓库编码 </th>
                    <td mat-cell *matCellDef="let element"> {{element.warehouseCode}} </td>
                </ng-container>

                <ng-container matColumnDef="materialName">
                    <th mat-header-cell *matHeaderCellDef> 物料名称 </th>
                    <td mat-cell *matCellDef="let element"> {{element.materialName}} </td>
                </ng-container>
                <ng-container matColumnDef="materialCode">
                    <th mat-header-cell *matHeaderCellDef> 物料编码 </th>
                    <td mat-cell *matCellDef="let element"> {{element.materialCode}} </td>
                </ng-container>
                <ng-container matColumnDef="spec">
                    <th mat-header-cell *matHeaderCellDef> 规格 </th>
                    <td mat-cell *matCellDef="let element"> {{element.spec}} </td>
                </ng-container>
                <ng-container matColumnDef="unit">
                    <th mat-header-cell *matHeaderCellDef> 库存单位 </th>
                    <td mat-cell *matCellDef="let element"> {{element.unit}} </td>
                </ng-container>
                <ng-container matColumnDef="qty">
                    <th mat-header-cell *matHeaderCellDef> 库存数量 </th>
                    <td mat-cell *matCellDef="let element"> {{element.qty}} </td>
                </ng-container>

                <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
            </table>
        </div>
    </div>

    <div class="footer">
        <mat-paginator [length]="total" [pageSize]="searchFormGroup.value.size" [pageSizeOptions]="pageSizeOptions"
            aria-label="选择要跳转的页面" (page)="getNotices($event)">
        </mat-paginator>
    </div>
</div>
