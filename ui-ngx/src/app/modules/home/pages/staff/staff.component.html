<div class="my_device_container">

    <div class="search_form">
        <div class="search_item">
            <div class="label">姓名:</div>
            <input type="text" [(ngModel)]="searchFormGroup.value.name">
        </div>
        <div class="search_item">
            <div class="label">性别:</div>
            <select required [(ngModel)]="searchFormGroup.value.sex">
                <option value="">全部</option>
                <option value="男">男</option>
                <option value="女">女</option>
            </select>
        </div>

        <button class="search_btn" (click)="getTableData()">
            <mat-icon>search</mat-icon> 查询
        </button>
        <button class="search_btn" (click)="reset()">
            <mat-icon>refresh</mat-icon> 重置
        </button>
        <!-- <button class="search_btn" (click)="getTableData()">
            <mat-icon svgIcon="daochu" aria-hidden="false" aria-label="Example thumbs up SVG icon"></mat-icon>
            导出
        </button> -->
    </div>

    <div class="info_container">

        <div class="info_title">
            <div class="btn_list">
                <button  *ngIf="set.has('/staff/add')" class="add_btn btn_color_primary" (click)="showAddVisibilly()">
                    <mat-icon>add</mat-icon> 新增人员
                </button>

                <button *ngIf="set.has('/staff/up')" class="add_btn btn_color_primary" (click)="handleUploadData()">
                    <mat-icon>file_upload</mat-icon>
                    导入
                </button>
            </div>
            <div class="info_tip">总共<span class="text_color_primary">{{total}}</span>个人员</div>
        </div>

        <div class="table_container">
            <table mat-table [dataSource]="dataSource" class="mat-elevation-z8">

                <!-- <ng-container matColumnDef="deviceId">
                    <th mat-header-cell *matHeaderCellDef> 序号 </th>
                    <td mat-cell *matCellDef="let element;index as i">{{i+1}}</td>
                </ng-container> -->


                <ng-container matColumnDef="name">
                    <th mat-header-cell *matHeaderCellDef> 姓名 </th>
                    <td mat-cell *matCellDef="let element"> {{element.name}} </td>
                </ng-container>


                <ng-container matColumnDef="sex">
                    <th mat-header-cell *matHeaderCellDef> 性别 </th>
                    <td mat-cell *matCellDef="let element"> {{element.sex}} </td>
                </ng-container>


                <ng-container matColumnDef="phone">
                    <th mat-header-cell *matHeaderCellDef> 手机号码 </th>
                    <td mat-cell *matCellDef="let element"> {{element.phone}} </td>
                </ng-container>

                <!-- <ng-container matColumnDef="station">
                    <th mat-header-cell *matHeaderCellDef> 岗位 </th>
                    <td mat-cell *matCellDef="let element"> {{handleStation(element.station)}} </td>
                </ng-container> -->

                <ng-container matColumnDef="class">
                    <th mat-header-cell *matHeaderCellDef> 班别 </th>
                    <td mat-cell *matCellDef="let element"> {{element.className}} </td>
                </ng-container>

                <!-- <ng-container matColumnDef="byDevicesType1">
                    <th mat-header-cell *matHeaderCellDef> 采集指纹 </th>
                    <td mat-cell *matCellDef="let element"> {{element.byDevicesType1==0?"否":"是"}} </td>
                </ng-container> -->

                <ng-container matColumnDef="enabledSt">
                    <th mat-header-cell *matHeaderCellDef> 状态 </th>
                    <td mat-cell *matCellDef="let element"
                        [ngClass]="{'enabled':element.enabledSt == 1,'disabled':element.enabledSt == 0}">
                        {{element.enabledSt == 1?"启用":"禁用"}} </td>

                </ng-container>

                <ng-container matColumnDef="customColumn1">
                    <th mat-header-cell *matHeaderCellDef> 操作 </th>
                    <td mat-cell *matCellDef="let element">
                        <button *ngIf="set.has('/staff/edit')" class="mini_btn edit_btn" (click)="lookDia(element,0)">编辑</button>

                        <button  class="mini_btn enter_btn" (click)="enterDia(element,1)"
                            *ngIf="element.enabledSt == 0 && set.has('/staff/enable')">启用</button>

                            <button class="mini_btn disable_btn" (click)="enterDia(element,0)"
                            *ngIf="element.enabledSt == 1 && set.has('/staff/disable')">禁用</button>

                            <button *ngIf="set.has('/staff/detail')" class="mini_btn look_btn" (click)="lookDia(element,1)">查看</button>


                            <button class="mini_btn del_btn" (click)="delDia(element)"
                            *ngIf="element.enabledSt == 0 && set.has('/staff/del')">删除</button>

                            <!-- <button class="mini_btn f_btn" (click)="fingerDia(element)">指纹采集</button> -->

                    </td>
                </ng-container>


                <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></tr>
                <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
            </table>
        </div>
    </div>

    <div class="footer">
        <mat-paginator [length]="total" [pageSize]="searchFormGroup.value.size" [pageSizeOptions]="pageSizeOptions"
            aria-label="选择要跳转的页面" (page)="getNotices($event)">
        </mat-paginator>
    </div>
</div>
