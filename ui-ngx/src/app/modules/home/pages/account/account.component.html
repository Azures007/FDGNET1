<div class="account_container">

    <div class="search_form">
        <div class="search_item">
            <div class="label">用户名:</div>
            <input type="text" [(ngModel)]="searchFormGroup.value.name">
        </div>
        <div class="search_item">
            <div class="label">账号:</div>
            <input type="text" [(ngModel)]="searchFormGroup.value.username" autocomplete="off">
        </div>
        <div class="search_item">
            <div class="label">状态:</div>
            <select required [(ngModel)]="searchFormGroup.value.userStatus">
                <option value="">全部</option>
                <option value="1">启用</option>
                <option value="0">禁用</option>
            </select>
        </div>
        <button class="search_btn" (click)="getTableData()" style="margin-right: 10px;">
            <mat-icon>search</mat-icon> 查询
        </button>
        <button class="search_btn" (click)="resetSearchForm()">
            <mat-icon>refresh</mat-icon> 重置
        </button>

    </div>

    <div class="info_container">

        <div class="info_title">
            <div class="btn_list">
                <button class="add_btn btn_color_primary" (click)="showAddVisibilly()" *ngIf="set.has('/account/add')">
                    <mat-icon>add</mat-icon> 新增账号
                </button>
            </div>
            <div class="info_tip">总共<span class="text_color_primary">{{total}}</span>个账号</div>
        </div>

        <div class="table_container">
            <table mat-table [dataSource]="dataSource" class="mat-elevation-z8">

                <ng-container matColumnDef="first_name">
                    <th mat-header-cell *matHeaderCellDef> 用户名 </th>
                    <td mat-cell *matCellDef="let element"> {{element.first_name}} </td>
                </ng-container>


                <ng-container matColumnDef="username">
                    <th mat-header-cell *matHeaderCellDef> 账号 </th>
                    <td mat-cell *matCellDef="let element"> {{element.username}} </td>
                </ng-container>


                <ng-container matColumnDef="role_name">
                    <th mat-header-cell *matHeaderCellDef> 角色 </th>
                    <td mat-cell *matCellDef="let element"> {{element.role_name}} </td>
                </ng-container>


                <ng-container matColumnDef="created_time">
                    <th mat-header-cell *matHeaderCellDef> 创建日期 </th>
                    <td mat-cell *matCellDef="let element"> {{element.created_time}} </td>
                </ng-container>

                <ng-container matColumnDef="created_name">
                    <th mat-header-cell *matHeaderCellDef> 创建人 </th>
                    <td mat-cell *matCellDef="let element"> {{element.created_name}} </td>
                </ng-container>

                <ng-container matColumnDef="user_status">
                    <th mat-header-cell *matHeaderCellDef> 账号状态 </th>
                    <td mat-cell *matCellDef="let element"
                        [ngClass]="{'enabled':element.user_status == 1,'disabled':element.user_status == 0}">
                        {{element.user_status == 1?"启用":"禁用"}} </td>

                </ng-container>

                <ng-container matColumnDef="customColumn1">
                    <th mat-header-cell *matHeaderCellDef> 操作 </th>
                    <td mat-cell *matCellDef="let element">
                        <button class="mini_btn edit_btn" (click)="lookUser(element,0)" *ngIf="set.has('/account/edit')">编辑</button>
                        <button class="mini_btn enter_btn" (click)="enterDia(element,1)"
                            *ngIf="element.user_status == 0 && set.has('/account/enable')">启用</button>
                        <button class="mini_btn disable_btn" (click)="enterDia(element,0)"
                            *ngIf="element.user_status == 1 && set.has('/account/disable')">禁用</button>
                        <button class="mini_btn look_btn" (click)="lookUser(element,1)">查看</button>
                        <button class="mini_btn del_btn" (click)="delDia(element)"
                            *ngIf="element.user_status == 0 && set.has('/account/del')">删除</button>
                        <button class="mini_btn page_btn del_btn" (click)="resetPwd(element)" *ngIf="set.has('/account/reset')">重置密码</button>

                        <button class="page_btn" (click)="showMenuDia(element)" *ngIf="set.has('/account/setrole')">角色配置</button>
                    </td>
                </ng-container>


                <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
            </table>
        </div>
    </div>
    <div class="footer">
        <mat-paginator [length]="total" [pageSize]="searchFormGroup.value.size" [pageSizeOptions]="pageSizeOptions"
            aria-label="选择要跳转的页面" (page)="getNotices($event)">
        </mat-paginator>
    </div>
</div>
