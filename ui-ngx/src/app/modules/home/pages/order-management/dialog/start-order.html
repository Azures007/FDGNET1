<div class="title">
  {{modalTitle}}
  <span class="close_icon" (click)="addDialogClose()"><mat-icon>clear</mat-icon></span>
</div>
<form [formGroup]="dataForm" class="content page-container">



  <div class="row-block equal-height">
    <div class="label"><span class="red-star">*</span>工艺路线:</div>
    <mat-form-field appearance="fill" class="select">
      <mat-select formControlName="craftId">
        <mat-option *ngFor="let item of craftOptions" [value]="item.value">
          {{item.label}}
        </mat-option>
      </mat-select>
      <mat-error *ngIf="dataForm.hasError('required','craftId')">
        请选择<strong>工艺路线</strong>
      </mat-error>
    </mat-form-field>
  </div>
  <div  class="row-block equal-height error_msg" *ngIf="materialError">
    <div class="label"><span class="red-star">*</span>异常说明:</div>
    <div class="msg_content">
      {{errorMsg}}
    </div>
  </div>
  <div class="row-block equal-height">
    <div class="label">备注说明:</div>
    <mat-form-field class="example-full-width" appearance="fill">
      <textarea matInput class="textarea" formControlName="craftDesc" maxlength="150"
        placeholder="请输入备注说明，限制150个字符"></textarea>
      <mat-error *ngIf="dataForm.hasError('required','craftDesc')">
        备注说明为<strong>必填</strong>
      </mat-error>
    </mat-form-field>
  </div>

</form>

<div class="footer">
  <button *ngIf="formType !== 'details'" (click)="submit()" mat-raised-button color="primary" class="search-btn btn">
    <mat-icon class="material-icons svgIcon">done</mat-icon>
    <span>提交</span>
  </button>

  <button *ngIf="formType === 'details'" (click)="addDialogClose()" mat-raised-button color="primary"
    class="search-btn btn">
    <mat-icon class="material-icons svgIcon">done</mat-icon>
    <span>关闭</span>
  </button>
</div>
