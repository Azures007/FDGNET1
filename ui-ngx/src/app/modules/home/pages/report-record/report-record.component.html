<div class="page-container flex-column">
  <div class="page-header">

    <div class="row-block cols4">
      <label class="label">报工时间</label>
      <mat-form-field appearance="fill" class="dateRange">
        <mat-date-range-input [formGroup]="pdRange" [rangePicker]="picker">
          <input readonly formControlName="start" matStartDate placeholder="开始日期">
          <input readonly formControlName="end" matEndDate placeholder="结束日期">
        </mat-date-range-input>
        <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
        <mat-date-range-picker fontSize="12" #picker></mat-date-range-picker>
      </mat-form-field>
    </div>

    <div class="row-block cols4">
      <label class="label">订单号</label>
      <input class="input" [(ngModel)]="searchFormGroup.value.orderNo" />
    </div>
    <div class="row-block cols4">
      <label class="label">物料名称</label>
      <input class="input" [(ngModel)]="searchFormGroup.value.materialName" />
    </div>
    <div class="row-block cols4">
      <label class="label">物料编码</label>
      <input class="input" [(ngModel)]="searchFormGroup.value.materialNumber" />
    </div>
    <div class="row-block cols4">
      <label class="label"></label>
      <div class="btn-group">
        <button class="search_btn" (click)="getTableData()">
          <mat-icon>search</mat-icon>查询
        </button>
        <button class="search_btn" (click)="reset()">
          <mat-icon>refresh</mat-icon>重置
        </button>
        <button class="search_btn" (click)="export()">
          <mat-icon>vertical_align_bottom</mat-icon>导出
        </button>
      </div>

    </div>


  </div>
  <div class="page-content">
    <table mat-table [dataSource]="dataSource" class="mat-elevation-z8">
      <ng-container matColumnDef="orderNo">
        <th mat-header-cell *matHeaderCellDef> 订单号 </th>
        <td mat-cell *matCellDef="let element"> {{element.orderNo}} </td>
      </ng-container>

      <!-- Name Column -->
      <ng-container matColumnDef="processName">
        <th mat-header-cell *matHeaderCellDef> 工序名称 </th>
        <td mat-cell *matCellDef="let element"> {{element.processName}} </td>
      </ng-container>
      <ng-container matColumnDef="reportTime">
        <th mat-header-cell *matHeaderCellDef> 报工时间 </th>
        <td mat-cell *matCellDef="let element"> {{element.reportTime}} </td>
      </ng-container>

      <!-- Weight Column -->
      <ng-container matColumnDef="personName">
        <th mat-header-cell *matHeaderCellDef> 报工人员 </th>
        <td mat-cell *matCellDef="let element"> {{element.personName}} </td>
      </ng-container>

      <!-- Symbol Column -->
      <ng-container matColumnDef="recordTypeBgName">
        <th mat-header-cell *matHeaderCellDef> 报工类型 </th>
        <td mat-cell *matCellDef="let element"> {{element.recordTypeBgName}} </td>
      </ng-container>
      <ng-container matColumnDef="materialName">
        <th mat-header-cell *matHeaderCellDef> 物料名称 </th>
        <td mat-cell *matCellDef="let element"> {{element.materialName}} </td>
      </ng-container>
      <ng-container matColumnDef="materialNumber">
        <th mat-header-cell *matHeaderCellDef> 物料编码 </th>
        <td mat-cell *matCellDef="let element"> {{element.materialNumber}} </td>
      </ng-container>
      <ng-container matColumnDef="potNumber">
        <th mat-header-cell *matHeaderCellDef> 锅数 </th>
        <td mat-cell *matCellDef="let element"> {{ element.potNumber }} </td>
      </ng-container>

      <ng-container matColumnDef="recordQty">
        <th mat-header-cell *matHeaderCellDef> 报工数量 </th>
        <td mat-cell *matCellDef="let element"> {{element.recordQty}} </td>
      </ng-container>
      <ng-container matColumnDef="recordUnit">
        <th mat-header-cell *matHeaderCellDef> 报工单位 </th>
        <td mat-cell *matCellDef="let element"> {{element.recordUnit}} </td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
  </div>

  <div class="page-footer">
    <mat-paginator [length]="total" [pageSize]="searchFormGroup.value.size" [pageSizeOptions]="pageSizeOptions"
      aria-label="选择要跳转的页面" (page)="getNotices($event)">
    </mat-paginator>
  </div>
</div>
