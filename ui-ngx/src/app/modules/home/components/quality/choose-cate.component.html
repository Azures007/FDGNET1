<div class="title">
  选择类目
  <span class="close_icon" (click)="addDialogClose()">X</span>
</div>

<div class="search_form">
  <div class="search_item">
    <div class="label">检查项目</div>
    <input type="text" [(ngModel)]="searchFormGroup.value.inspectionItem" placeholder="请输入检查项目" style="width: 180px;">
  </div>
  <div class="search_item">
    <div class="label">关键工序</div>
    <input type="text" [(ngModel)]="searchFormGroup.value.keyProcess" placeholder="请输入关键工序" style="width: 180px;">
  </div>
  <div class="search_item">
    <div class="label">产品名称</div>
    <input type="text" [(ngModel)]="searchFormGroup.value.productName" placeholder="请输入产品名称" style="width: 180px;">
  </div>
  <button class="search_btn" style="margin-right: 10px;" (click)="getTableData()">
    <mat-icon>search</mat-icon> 查询
  </button>
  <button class="search_btn" (click)="reset()">
    <mat-icon>clear</mat-icon> 重置
  </button>
</div>
<div class="table-wrapper">
  <table mat-table [dataSource]="dataSource" class="mat-elevation-z8">
    <ng-container matColumnDef="no" sticky="true">
      <th mat-header-cell *matHeaderCellDef> 序号 </th>
      <td mat-cell *matCellDef="let element"> {{element.no}} </td>
    </ng-container>
    <ng-container matColumnDef="frequency">
      <th mat-header-cell *matHeaderCellDef> 频次</th>
      <td mat-cell *matCellDef="let element"> {{getFrequency(element.frequency)}} </td>
    </ng-container>
    <ng-container matColumnDef="importantItem">
      <th mat-header-cell *matHeaderCellDef> 重点项目 </th>
      <td mat-cell *matCellDef="let element"> {{element.importantItem}} </td>
    </ng-container>
    <ng-container matColumnDef="remark">
      <th mat-header-cell *matHeaderCellDef> 备注 </th>
      <td mat-cell *matCellDef="let element"> {{element.remark}} </td>
    </ng-container>
    <ng-container matColumnDef="customColumn1">
      <th mat-header-cell *matHeaderCellDef> 操作 </th>
      <td mat-cell *matCellDef="let element">
        <button class="mini_btn edit_btn" (click)="handleChoose(element)">选择</button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
  <mat-paginator [length]="total" [pageSize]="searchFormGroup.value.size" [pageSizeOptions]="pageSizeOptions"
    aria-label="选择要跳转的页面" (page)="getNotices($event)">
  </mat-paginator>
</div>

<div class="footer">
  <button (click)="addDialogClose()" mat-raised-button color="primary" class="search-btn btn">
    <mat-icon class="material-icons svgIcon">done</mat-icon>
    <span>关闭</span>
  </button>
</div>
