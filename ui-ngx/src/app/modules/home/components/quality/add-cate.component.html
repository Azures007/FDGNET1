<div class="title">
  {{modalTitle}}
  <span class="close_icon" (click)="addDialogClose()"><mat-icon>clear</mat-icon></span>
</div>
<div class="cate-content">
  <form [formGroup]="dataForm" class="content page-container two-col">
    <div class="row-block">
      <label class="label"><span class="red-star">*</span>检查项目:</label>
      <mat-form-field class="example-full-width" appearance="fill">
        <input autocomplete="off" class="input" formControlName="inspectionItem" type="text" matInput
          placeholder="请输入检查项目">
        <mat-error *ngIf="dataForm.hasError('required','inspectionItem')">
          检查项目为<strong>必填</strong>
        </mat-error>
      </mat-form-field>
    </div>
    <div class="row-block">
      <label class="label"><span class="red-star">*</span>关键工序：</label>
      <mat-form-field appearance="fill" class="select">
        <mat-select formControlName="keyProcess">
          <mat-option *ngFor="let item of process" [value]="item.codeValue">
            {{item.codeDsc}}
          </mat-option>
        </mat-select>
        <mat-error *ngIf="dataForm.hasError('required','keyProcess')">
          请选择<strong>关键工序</strong>
        </mat-error>
      </mat-form-field>
    </div>

    <div class="row-block">
      <label class="label"><span class="red-star">*</span>监控方法：</label>
      <mat-form-field appearance="fill" class="select">
        <mat-select formControlName="monitoringMethod" multiple>
          <mat-option *ngFor="let item of methods" [value]="item.codeValue">
            {{item.codeDsc}}
          </mat-option>
        </mat-select>
        <mat-error *ngIf="dataForm.hasError('required','monitoringMethod')">
          请选择<strong>监控方法</strong>
        </mat-error>
      </mat-form-field>

    </div>

    <div class="row-block">
      <div class="label"><span class="red-star">*</span>状态:</div>
      <mat-form-field appearance="fill" class="select">
        <mat-select formControlName="isEnabled">
          <mat-option *ngFor="let item of status" [value]="item.value">
            {{item.label}}
          </mat-option>
        </mat-select>
        <mat-error *ngIf="dataForm.hasError('required','isEnabled')">
          请选择<strong>状态</strong>
        </mat-error>
      </mat-form-field>
    </div>
    <div class="row-block">
      <div class="label">标准:</div>
      <mat-form-field class="example-full-width" appearance="fill">
        <textarea matInput class="textarea" formControlName="standard" placeholder="请输入标准"></textarea>
      </mat-form-field>
    </div>
    <div class="row-block">
      <div class="label">备注:</div>
      <mat-form-field class="example-full-width" appearance="fill">
        <textarea matInput class="textarea" formControlName="remarks" placeholder="请输入备注"></textarea>
      </mat-form-field>
    </div>

  </form>
  <div class="setting-warp">
    <div class="set-title">配置信息
      <button *ngIf="formType !== 'details'" class="add_btn btn_color_primary btn" (click)="addConfig()"
        style="margin-left: 10px;">
        <mat-icon>add</mat-icon> 新增
      </button>
      <button *ngIf="formType !== 'details' && configs.length" class="add_btn btn_color_primary btn" (click)="delConfig()"

        style="margin-left: 10px;">
        <mat-icon>delete</mat-icon> 删除
      </button>
    </div>
    <div class="setting-panl">
      <table class="table">
        <tr>
          <th><mat-checkbox [(ngModel)]="isAllChecked" [disabled]="formType === 'details'"></mat-checkbox></th>
          <th>序号</th>
          <th>品名</th>
          <th>字段名称</th>
          <th>是否启用</th>
          <th>字段类型</th>
          <th>参数范围</th>
          <th>下拉框字段</th>
          <th>单位</th>
          <th>是否必填</th>
        </tr>
        <tr *ngFor="let item of configs; let i = index">
          <td [rowSpan]="fieldNames.length" *ngIf="i%fieldNames.length==0">
            <div>
              <mat-checkbox [(ngModel)]="item.isChecked" (change)="checkChange($event,i)"
                [disabled]="formType === 'details'"></mat-checkbox>
            </div>
          </td>
          <td [rowSpan]="fieldNames.length" *ngIf="i%fieldNames.length==0">
            <div>{{i/fieldNames.length + 1}}</div>
          </td>
          <td [rowSpan]="fieldNames.length" *ngIf="i%fieldNames.length==0">
            <div>{{item.materialName}}<span *ngIf="formType !== 'details'" class="btn btn-color"
                (click)="selectMaterial(item, i)">选择</span></div>
          </td>
          <td>
            <div>
              <select required [(ngModel)]="item.fieldName" [disabled]="formType === 'details'">
                <option *ngFor="let field of fieldNames" [value]="field.codeValue">
                  {{field.codeDsc}}
                </option>
              </select>
            </div>
          </td>
          <td>
            <div>
              <select required [(ngModel)]="item.isEnabled" [disabled]="formType === 'details'">
                <option value="1">是</option>
                <option value="0">否</option>
              </select>
            </div>
          </td>
          <td>
            <div>
              <select required [(ngModel)]="item.fieldType" [disabled]="formType === 'details'">
                <option *ngFor="let type of fieldTypes" [value]="type.codeValue">
                  {{type.codeDsc}}
                </option>
              </select>
            </div>
          </td>
          <td>
            <div>
              <input [disabled]="formType === 'details'" class="sortInput" autocomplete="off"
                [(ngModel)]="item.parameterRange">
            </div>
          </td>
          <td>
            <div>
              <input [disabled]="formType === 'details'" class="sortInput" autocomplete="off"
                [(ngModel)]="item.dropdownFields">
            </div>
          </td>
          <td>
            <div>
              <input [disabled]="formType === 'details'" class="sortInput" autocomplete="off" [(ngModel)]="item.unit">
            </div>
          </td>
          <td>
            <div>
              <select required [(ngModel)]="item.isRequired" [disabled]="formType === 'details'">
                <option value="1">是</option>
                <option value="0">否</option>
              </select>
            </div>
          </td>
        </tr>
      </table>
    </div>
  </div>
</div>


<div class="footer">
  <button *ngIf="formType !== 'details'" (click)="submit()" mat-raised-button color="primary" class="search-btn btn">
    <span>提交</span>
  </button>

  <button style="margin-left: 10px;" [mat-dialog-close]>取消</button>
</div>
