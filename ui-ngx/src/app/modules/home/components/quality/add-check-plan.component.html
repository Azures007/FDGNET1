<div class="title">
  {{modalTitle}}
  <span class="close_icon" (click)="addDialogClose()"><mat-icon>clear</mat-icon></span>
</div>
<div class="cate-content">
  <form [formGroup]="dataForm" class="content page-container two-col">
    <div class="row-block">
      <label class="label"><span class="red-star">*</span>方案名称：</label>
      <mat-form-field class="example-full-width" appearance="fill">
        <div class="relative">
          <input autocomplete="off" class="input" formControlName="productName" type="text" matInput
            placeholder="请选择方案">
          <!-- <span class="absolute" (click)="selectProduct()" *ngIf="formType !== 'details'">选择</span> -->
        </div>
        <mat-error *ngIf="dataForm.hasError('required','productName')">
          方案名称为<strong>必填</strong>
        </mat-error>
      </mat-form-field>

    </div>
    <div class="row-block">
      <label class="label"><span class="red-star">*</span>生产线：</label>
      <mat-form-field appearance="fill" class="select">
        <mat-select formControlName="prodLineId">
          <mat-option *ngFor="let item of baseList" [value]="item.cwkid">
            {{item.vwkname}}
          </mat-option>
        </mat-select>
        <mat-error *ngIf="dataForm.hasError('required','prodLineId')">
          请选择<strong>生产线</strong>
        </mat-error>
      </mat-form-field>
    </div>

    <div class="row-block">
      <div class="label"><span class="red-star">*</span>状态:</div>
      <mat-form-field appearance="fill" class="select">
        <mat-select formControlName="enabled">
          <mat-option *ngFor="let item of status" [value]="item.value">
            {{item.label}}
          </mat-option>
        </mat-select>
        <mat-error *ngIf="dataForm.hasError('required','enabled')">
          请选择<strong>状态</strong>
        </mat-error>
      </mat-form-field>
    </div>
    <div class="row-block">
      <div class="label">备注:</div>
      <mat-form-field class="example-full-width" appearance="fill">
        <textarea matInput class="textarea" formControlName="remark" placeholder="请输入备注"></textarea>
      </mat-form-field>
    </div>

  </form>
  <div class="setting-warp">
    <div class="set-title">配置信息
      <button *ngIf="formType !== 'details'" class="add_btn btn_color_primary btn" (click)="addConfig()"
        style="margin-left: 10px;">
        <mat-icon>add</mat-icon> 新增
      </button>
      <button *ngIf="formType !== 'details' && configs.length" class="add_btn btn_color_primary btn" (click)="delConfig()"

        style="margin-left: 10px;">
        <mat-icon>delete</mat-icon> 删除
      </button>
    </div>
    <div class="setting-panl">
      <table class="table">
        <tr>
          <th><mat-checkbox [(ngModel)]="isAllChecked" [disabled]="formType === 'details'"></mat-checkbox></th>
          <th>序号</th>
          <th>频次</th>
          <th>重点项目</th>
          <th>达成（异常）情况描述</th>
        </tr>
        <tr *ngFor="let item of configs; let i = index">
          <td >
            <div>
              <mat-checkbox [(ngModel)]="item.isChecked" (change)="checkChange($event, item)"
                [disabled]="formType === 'details'"></mat-checkbox>
            </div>
          </td>
          <td >
            <div>{{i + 1}}</div>
          </td>
          <td >
            <div>{{ getFrequency(item.frequency) }}</div>
          </td>
          <td>
            <div>{{ item.importantItem }}</div>
          </td>
          <td class="padding-none">
            <div class="border-none" *ngFor="let subItem of item.itemList;">{{ subItem.fieldName }}</div>
          </td>
        </tr>
      </table>
    </div>
  </div>
</div>


<div class="footer">
  <button *ngIf="formType !== 'details'" (click)="submit()" mat-raised-button color="primary" class="search-btn btn">
    <mat-icon class="material-icons svgIcon">done</mat-icon>
    <span>提交</span>
  </button>

  <button *ngIf="formType === 'details'" (click)="addDialogClose()" mat-raised-button color="primary"
    class="search-btn btn">
    <mat-icon class="material-icons svgIcon">done</mat-icon>
    <span>关闭</span>
  </button>
</div>
