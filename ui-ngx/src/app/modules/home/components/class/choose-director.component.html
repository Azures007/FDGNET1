<div class="title">
  选择车间主任
  <span class="close_icon" (click)="addDialogClose()">X</span>
</div>

<div class="search_form">
  <div class="search_item">
    <div class="label">姓名:</div>
    <input type="text" [(ngModel)]="searchFormGroup.value.name">
  </div>
  <div class="search_item">
    <div class="label">性别:</div>
    <select required [(ngModel)]="searchFormGroup.value.sex">
      <option value="">全部</option>
      <option value="男">男</option>
      <option value="女">女</option>
    </select>
  </div>

  <button class="search_btn" (click)="getTableData()" style="margin-right: 10px;">
    <mat-icon>search</mat-icon> 查询
  </button>
  <button class="search_btn" (click)="reset()">
      <mat-icon>clear</mat-icon> 重置
    </button>
</div>

<table mat-table [dataSource]="dataSource" class="mat-elevation-z8">
  <ng-container matColumnDef="name">
    <th mat-header-cell *matHeaderCellDef> 姓名 </th>
    <td mat-cell *matCellDef="let element"> {{element.name}} </td>
  </ng-container>


  <ng-container matColumnDef="sex">
    <th mat-header-cell *matHeaderCellDef> 性别 </th>
    <td mat-cell *matCellDef="let element"> {{element.sex}} </td>
  </ng-container>


  <ng-container matColumnDef="phone">
    <th mat-header-cell *matHeaderCellDef> 手机号码 </th>
    <td mat-cell *matCellDef="let element"> {{element.phone}} </td>
  </ng-container>
  <ng-container matColumnDef="customColumn1">
    <th mat-header-cell *matHeaderCellDef> 操作 </th>
    <td mat-cell *matCellDef="let element">
      <button class="mini_btn edit_btn" (click)="handleChoose(element)">选择</button>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
</table>
<mat-paginator [length]="total" [pageSize]="searchFormGroup.value.size" [pageSizeOptions]="pageSizeOptions"
  aria-label="选择要跳转的页面" (page)="getNotices($event)">
</mat-paginator>
<div class="footer">
  <button (click)="addDialogClose()" mat-raised-button color="primary" class="search-btn btn">
    <mat-icon class="material-icons svgIcon">done</mat-icon>
    <span>关闭</span>
  </button>
</div>
