<div class="title">
  {{injectData.title || '选择还原材料'}}
  <span class="close_icon" (click)="addDialogClose()">X</span>
</div>

<div class="search_form">
    <div class="search_item">
      <div class="label">物料分类:</div>
      <input type="text" [(ngModel)]="searchFormGroup.value.ncMaterialCategory" placeholder="请输入物料分类"
        style="width: 180px;">
    </div>
    <div class="search_item">
      <div class="label">材料编码:</div>
      <input type="text" [(ngModel)]="searchFormGroup.value.materialCode" placeholder="请输入材料编码"
        style="width: 180px;">
    </div>
    <div class="search_item">
      <div class="label">材料名称:</div>
      <input type="text" [(ngModel)]="searchFormGroup.value.materialName" placeholder="请输入材料名称"
        style="width: 180px;">
    </div>
    <div class="search_item">
      <div class="label">状态:</div>
      <select required [(ngModel)]="searchFormGroup.value.materialStatus">
        <option value="">全部</option>
        <option value="1">启用</option>
        <option value="0">禁用</option>
      </select>
    </div>
    <button class="search_btn" style="margin-right: 10px;" (click)="getTableData()">
      <mat-icon>search</mat-icon> 查询
    </button>
    <button class="search_btn" (click)="reset()">
      <mat-icon>clear</mat-icon> 重置
    </button>
  </div>

<table mat-table [dataSource]="dataSource" class="mat-elevation-z8">
  <ng-container matColumnDef="ncMaterialCategory">
    <th mat-header-cell *matHeaderCellDef> 物料分类 </th>
    <td mat-cell *matCellDef="let element"> {{element.ncMaterialCategory}} </td>
  </ng-container>
  <ng-container matColumnDef="materialName">
    <th mat-header-cell *matHeaderCellDef> 材料名称 </th>
    <td mat-cell *matCellDef="let element"> {{element.materialName}} </td>
  </ng-container>
  <ng-container matColumnDef="materialCode">
    <th mat-header-cell *matHeaderCellDef> 材料编码 </th>
    <td mat-cell *matCellDef="let element"> {{element.materialCode}} </td>
  </ng-container>
  <ng-container matColumnDef="customColumn1">
    <th mat-header-cell *matHeaderCellDef> 操作 </th>
    <td mat-cell *matCellDef="let element">
      <button class="mini_btn edit_btn" (click)="handleChoose(element)">选择</button>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
</table>
<mat-paginator [length]="total" [pageSize]="searchFormGroup.value.size" [pageSizeOptions]="pageSizeOptions"
  aria-label="选择要跳转的页面" (page)="getNotices($event)">
</mat-paginator>
<div class="footer">
  <button (click)="addDialogClose()" mat-raised-button color="primary" class="search-btn btn">
    <mat-icon class="material-icons svgIcon">done</mat-icon>
    <span>关闭</span>
  </button>
</div>
