<div class="title">
  {{injectData.title}}
  <span class="close_icon" (click)="addDialogClose()">X</span>
</div>
<div class="table-wrapper">
  <table mat-table [dataSource]="injectData.dataSource" class="mat-elevation-z8">
    <ng-container matColumnDef="sort">
      <th mat-header-cell *matHeaderCellDef> 执行序号 </th>
      <td mat-cell *matCellDef="let element"> {{element.sort}} </td>
    </ng-container>
    <ng-container matColumnDef="processName">
      <th mat-header-cell *matHeaderCellDef> 工序 </th>
      <td mat-cell *matCellDef="let element"> {{element.processName}} </td>
    </ng-container>
    <ng-container matColumnDef="className">
      <th mat-header-cell *matHeaderCellDef> 班别 </th>
      <td mat-cell *matCellDef="let element"> {{element.className}} </td>
    </ng-container>
    <ng-container matColumnDef="groupLeader">
      <th mat-header-cell *matHeaderCellDef> 组长 </th>
      <td mat-cell *matCellDef="let element"> {{element.groupLeader}} </td>
    </ng-container>
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
</div>

<div class="footer">
  <button (click)="addDialogClose()" mat-raised-button color="primary" class="search-btn btn">
    <mat-icon class="material-icons svgIcon">done</mat-icon>
    <span>关闭</span>
  </button>
</div>
