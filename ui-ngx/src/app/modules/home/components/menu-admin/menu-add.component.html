<div class="title">
  {{modalTitle}}
  <span class="close_icon" (click)="addDialogClose()"><mat-icon>clear</mat-icon></span>
</div>

<form [formGroup]="dataForm" class="content page-container">

  <div class="row-block">
    <label class="label"><span class="red-star">*</span>菜单名称:</label>
    <mat-form-field class="example-full-width" appearance="fill">
      <input autocomplete="off" class="input" formControlName="menuName" type="text" matInput placeholder="请输入菜单名称">
      <mat-error *ngIf="dataForm.hasError('required','menuName')">
        菜单名称为<strong>必填</strong>
      </mat-error>
    </mat-form-field>
  </div>

  <div class="row-block">
    <label class="label"><span class="red-star">*</span>父菜单:</label>
    <mat-form-field class="example-full-width" appearance="fill">
      <input autocomplete="off" class="input" formControlName="parentId" type="text" matInput placeholder="请输入父菜单">
      <mat-error *ngIf="dataForm.hasError('required','parentId')">
        父菜单为<strong>必填</strong>
      </mat-error>
    </mat-form-field>
  </div>

  <div class="row-block">
    <div class="label">菜单类型:</div>
    <mat-form-field appearance="fill" class="select">
      <mat-select formControlName="menuType">
        <mat-option *ngFor="let item of menuTypeS" [value]="item.value">
          {{item.label}}
        </mat-option>
      </mat-select>
      <mat-error *ngIf="dataForm.hasError('required','menuType')">
        请选择<strong>类型</strong>
      </mat-error>
    </mat-form-field>
  </div>
  <div class="row-block">
    <div class="label"><span class="red-star">*</span>菜单标识:</div>
    <mat-form-field appearance="fill" class="select">
      <mat-select formControlName="flag">
        <mat-option *ngFor="let item of menuFlagS" [value]="item.value">
          {{item.label}}
        </mat-option>
      </mat-select>
      <mat-error *ngIf="dataForm.hasError('required','flag')">
        请选择<strong>菜单标识</strong>
      </mat-error>
    </mat-form-field>
  </div>
  <div class="row-block">
    <label class="label">图标:</label>
    <mat-form-field class="example-full-width" appearance="fill">
      <input autocomplete="off" class="input" formControlName="menuExplain" type="text" matInput placeholder="请输入图标文本">
    </mat-form-field>
  </div>
  <div class="row-block">
    <label class="label"><span class="red-star">*</span>备注:</label>
    <mat-form-field class="example-full-width" appearance="fill">
      <input autocomplete="off" class="input" formControlName="br" type="text" matInput placeholder="请输入备注">
      <mat-error *ngIf="dataForm.hasError('required','br')">
        备注为<strong>必填</strong>
      </mat-error>
    </mat-form-field>
  </div>

  <div class="row-block">
    <label class="label"><span class="red-star">*</span>排序:</label>
    <mat-form-field class="example-full-width" appearance="fill">
      <input autocomplete="off" class="input" formControlName="sort" type="text" matInput placeholder="请输入排序">
      <mat-error *ngIf="dataForm.hasError('required','sort')">
        排序为<strong>必填</strong>
      </mat-error>
    </mat-form-field>
  </div>

  <div class="row-block">
    <div class="label"><span class="red-star">*</span>状态:</div>
    <mat-form-field appearance="fill" class="select">
      <mat-select formControlName="enabled">
        <mat-option *ngFor="let item of status" [value]="item.value">
          {{item.label}}
        </mat-option>
      </mat-select>
      <mat-error *ngIf="dataForm.hasError('required','enabled')">
        请选择<strong>状态</strong>
      </mat-error>
    </mat-form-field>
  </div>

  <div class="row-block">
    <label class="label"><span class="red-star">*</span>URL:</label>
    <mat-form-field class="example-full-width" appearance="fill">
      <input autocomplete="off" class="input" formControlName="path" type="text" matInput placeholder="请输入URL">
      <mat-error *ngIf="dataForm.hasError('required','path')">
        URL为<strong>必填</strong>
      </mat-error>
    </mat-form-field>
  </div>
  <div class="row-block" *ngIf="this.dataForm?.value?.flag=='2'">
    <label class="label">外链URL:</label>
    <mat-form-field class="example-full-width" appearance="fill">
      <input autocomplete="off" class="input" formControlName="skipUrl" type="text" matInput placeholder="请输入外链URL">
    </mat-form-field>
  </div>
</form>

<div class="footer">
  <button *ngIf="formType !== 'details'" (click)="submit()" mat-raised-button color="primary" class="search-btn btn">
    <mat-icon class="material-icons svgIcon">done</mat-icon>
    <span>提交</span>
  </button>

  <button (click)="addDialogClose()" mat-raised-button color="primary" class="search-btn btn">
    <mat-icon class="material-icons svgIcon">done</mat-icon>
    <span>关闭</span>
  </button>
</div>
