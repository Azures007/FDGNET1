<div class="title">
    选择账号
    <span class="close_icon" (click)="DialogClose()">X</span>
</div>

<div class="main_content">
    <div class="search_item">
        <input type="text" placeholder="用户名进行搜索" [(ngModel)]="name">
        <button class="search_btn" (click)="getList()">搜索</button>
    </div>
    <div class="table_container">
        <table mat-table [dataSource]="data.accountList" class="mat-elevation-z8">
          
            <ng-container matColumnDef="first_name">
                <th mat-header-cell *matHeaderCellDef> 用户名 </th>
                <td mat-cell *matCellDef="let element"> {{element.first_name}} </td>
            </ng-container>

        
            <ng-container matColumnDef="username">
                <th mat-header-cell *matHeaderCellDef> 账号 </th>
                <td mat-cell *matCellDef="let element"> {{element.username}} </td>
            </ng-container>

            
            <ng-container matColumnDef="role_name">
                <th mat-header-cell *matHeaderCellDef> 角色名 </th>
                <td mat-cell *matCellDef="let element"> {{element.role_name}} </td>
            </ng-container>


            <ng-container matColumnDef="customColumn1">
                <th mat-header-cell *matHeaderCellDef> 选择 </th>
                <td mat-cell *matCellDef="let element">
                    <input type="radio" name="currentAccount" [value]="element.username" id="" [ngModel]="currentAccount" (ngModelChange)="currentChange(element)">
                </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        </table>
    </div>
</div>

<div class="footer">
    <button (click)="submit()" cdkFocusInitial> 确定</button>
</div>
