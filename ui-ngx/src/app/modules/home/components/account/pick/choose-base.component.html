<div class="title">
  选择{{injectData.title}}
  <span class="close_icon" (click)="addDialogClose()"><mat-icon>clear</mat-icon></span>
</div>
<div class="search_form">
  <div class="search_item">
    <div class="label">{{injectData.title}}名称:</div>
    <input type="text" [(ngModel)]="name">
  </div>
  <button class="search_btn" (click)="search()">
    <mat-icon>search</mat-icon> 查询
  </button>

</div>
<div class="table-wrapper">
  <table mat-table [dataSource]="dataSource" class="mat-elevation-z8">
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef> {{injectData.title}}名称 </th>
      <td mat-cell *matCellDef="let element"> {{element.name}} </td>
    </ng-container>
    <ng-container matColumnDef="customColumn1">
      <th mat-header-cell *matHeaderCellDef> 操作 </th>
      <td mat-cell *matCellDef="let element">
        <button class="mini_btn edit_btn" (click)="handleChoose(element)">选择</button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
</div>

<div class="footer">
  <button (click)="addDialogClose()" mat-raised-button color="primary" class="search-btn btn">
    <mat-icon class="material-icons svgIcon">done</mat-icon>
    <span>关闭</span>
  </button>
</div>
