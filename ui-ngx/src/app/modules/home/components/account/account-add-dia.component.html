<div class="title">
    新建账号
    <span class="close_icon" (click)="addDialogClose()"><mat-icon>clear</mat-icon></span>
</div>
<div class="content">
    <div class="item">
        <div class="label">用户名:</div>
        <input type="text" [(ngModel)]="data.first_name" placeholder="请输入用户名">
    </div>
    <div class="item">
        <div class="label">账号:</div>
        <input type="text" maxlength="11"
            [(ngModel)]="data.username" placeholder="请输入登录账号" autocomplete="false">
    </div>
    <div class="item">
        <div class="label">登录密码:</div>
        <input type="text" maxlength="6" [(ngModel)]="data.password"
            placeholder="请输入登录密码(6位字母或数字)" autocomplete="false" onfocus="this.type='password'">
    </div>
    <div class="item">
        <div class="label">确认密码:</div>
        <input type="text" maxlength="6" [(ngModel)]="checkWord"
            placeholder="再次输入登录密码(6位字母或数字)" onfocus="this.type='password'">
    </div>
</div>
<div class="setting-warp">
  <div class="set-title">
    <span>基地</span>
    <button class="add_btn btn_color_primary" (click)="addBase()"
      style="margin-left: 10px;">新增
    </button>
  </div>
  <div class="setting-panl">
    <table class="table">
      <tr>
        <th class="class-handle">基地</th>
        <th class="class-handle">产线</th>
        <th class="class-handle">仓库</th>
        <th>操作</th>
      </tr>
      <tr *ngFor="let item of baseList; let i = index">
        <td class="class-handle">
          <div class="join-content ">
            <div class="standard-chip-warp">
              <div class="standard-chip">
                <span>{{item.ncOrgName}}</span>
              </div>
            </div>
            <div class="addbtn" (click)="showBasePick(item,i)">+选择</div>
          </div>
        </td>
        <td class="class-handle">
          <div class="join-content ">
            <div class="standard-chip-warp">
              <div class="standard-chip">
                <span>{{item.ncVwkname}}</span>
              </div>
            </div>
            <div class="addbtn" (click)="showLinePick(item,i)">+选择</div>
          </div>
        </td>
        <td class="class-handle">
          <div class="join-content ">
            <div class="standard-chip-warp">
              <div class="standard-chip">
                <span>{{item.ncWarehouseName}}</span>
              </div>
            </div>
            <div class="addbtn" (click)="showWarehousePick(item,i)">+选择</div>
          </div>
        </td>
        <td>
          <div class="group-btn">
            <!-- <button class="mini_btn edit_btn" (click)="selectBase(i)">选择</button> -->
            <button class="mini_btn del_btn" (click)="delBase(i)">删除</button>
          </div>
        </td>
      </tr>
    </table>
  </div>
</div>
<div class="footer">
    <button (click)="addSubmitDialogClose()" cdkFocusInitial>提交</button>
</div>
