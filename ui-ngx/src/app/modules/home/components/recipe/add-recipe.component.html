<div class="title">
  {{modalTitle}}
  <span class="close_icon" (click)="addDialogClose()"><mat-icon>clear</mat-icon></span>
</div>
<div class="cate-content">
  <form [formGroup]="dataForm" class="content page-container two-col">
    <div class="row-block">
      <label class="label"><span class="red-star">*</span>配方名称:</label>
      <mat-form-field class="example-full-width" appearance="fill">
        <input autocomplete="off" class="input" formControlName="recipeName" type="text" matInput
          placeholder="请输入配方名称">
        <mat-error *ngIf="dataForm.hasError('required','recipeName')">
          配方名称为<strong>必填</strong>
        </mat-error>
      </mat-form-field>
    </div>
    <div class="row-block">
      <label class="label"><span class="red-star">*</span>配方编号:</label>
      <mat-form-field class="example-full-width" appearance="fill">
        <input autocomplete="off" class="input" formControlName="recipeCode" type="text" matInput
          placeholder="请输入配方编号">
        <mat-error *ngIf="dataForm.hasError('required','recipeCode')">
          配方编号为<strong>必填</strong>
        </mat-error>
      </mat-form-field>
    </div>
    <div class="row-block">
      <label class="label"><span class="red-star">*</span>基地：</label>
      <mat-form-field appearance="fill" class="select">
        <mat-select formControlName="pkOrg">
          <mat-option *ngFor="let item of pkOrgList" [value]="item.id">
            {{item.name}}
          </mat-option>
        </mat-select>
        <mat-error *ngIf="dataForm.hasError('required','pkOrg')">
          请选择<strong>基地</strong>
        </mat-error>
      </mat-form-field>
    </div>
    <div class="row-block">
      <div class="label"><span class="red-star">*</span>状态:</div>
      <mat-form-field appearance="fill" class="select">
        <mat-select formControlName="status">
          <mat-option *ngFor="let item of status" [value]="item.value">
            {{item.label}}
          </mat-option>
        </mat-select>
        <mat-error *ngIf="dataForm.hasError('required','status')">
          请选择<strong>状态</strong>
        </mat-error>
      </mat-form-field>
    </div>
    <div class="row-block">
      <div class="label">配方说明:</div>
      <mat-form-field class="example-full-width" appearance="fill">
        <textarea matInput class="textarea" formControlName="recipeDescription" placeholder="请输入配方说明"></textarea>
      </mat-form-field>
    </div>
    <div class="row-block">
      <div class="label">创建人:</div>
      <mat-form-field class="example-full-width" appearance="fill">
        <input autocomplete="off" class="input" formControlName="creator" type="text" matInput>
      </mat-form-field>
    </div>
    <div class="row-block">
      <div class="label">创建时间:</div>
      <mat-form-field class="example-full-width" appearance="fill">
        <input autocomplete="off" class="input" formControlName="createTime" type="text" matInput>
      </mat-form-field>
    </div>
  </form>
  <div class="setting-warp">
    <div class="set-title">投入设置
      <button *ngIf="formType !== 'details'" class="add_btn btn_color_primary btn" (click)="addConfig()"
        style="margin-left: 10px;">
        <mat-icon>add</mat-icon> 新增
      </button>
    </div>
    <div class="setting-panl" *ngFor="let item of groupedInputs; let i = index">
      <div class="common-configs">
        <div class="config-item">
          <div class="label">半成品：</div>
          <div class="value">
            <div>{{item.semiFinishedProductName}}<span *ngIf="formType !== 'details'" class="btn btn-color"
                (click)="selectSemiFinishedProduct(item, i)">选择</span></div>
          </div>
        </div>
        <div class="config-item">
          <div class="label">工序：</div>
          <div class="value">
            <select required [(ngModel)]="item.processNumber" [disabled]="formType === 'details'">
              <option *ngFor="let process of injectData.processList" [value]="process.processNumber">
                {{process.processName}}
              </option>
            </select>
          </div>
        </div>
        <div class="config-item">
          <div class="label"></div>
          <div class="value">
            <button *ngIf="formType !== 'details'" class="add_btn btn_color_primary btn" (click)="delConfig(i)"
              style="margin-left: 10px;">
              <mat-icon>delete</mat-icon> 删除
            </button>
          </div>
        </div>
      </div>
      <table class="table">
        <tr>
          <!-- <th><mat-checkbox [(ngModel)]="isAllChecked" [disabled]="formType === 'details'"></mat-checkbox></th> -->
          <th>物料名称</th>
          <th>物料编码</th>
          <th>每锅/每次投入标准</th>
          <th>单位</th>
          <th>投入下限比例%</th>
          <th>投入上限比例%</th>
          <th>操作</th>
        </tr>
        <tr *ngFor="let subItem of item.inputs; let j = index">
          <!-- <td>
            <div>
              <mat-checkbox [(ngModel)]="item.isChecked" (change)="checkChange($event,i, j)"
                [disabled]="formType === 'details'"></mat-checkbox>
            </div>
          </td> -->
          <td>
            <div>{{subItem.materialName}}<span *ngIf="formType !== 'details'" class="btn btn-color"
                (click)="selectMaterial(subItem, i, j)">选择</span></div>
          </td>
          <td>
            <div>{{subItem.materialCode}}</div>
          </td>
          <td>
            <div>
              <input [disabled]="formType === 'details'" class="sortInput" autocomplete="off"
                [(ngModel)]="subItem.standardInput">
            </div>
          </td>
          <td>
            <div>
              <select required [(ngModel)]="subItem.unit" [disabled]="formType === 'details'">
                <option *ngFor="let unit of unitList" [value]="unit.codeValue">
                  {{unit.codeDsc}}
                </option>
              </select>
            </div>
          </td>
          <td>
            <div>
              <input [disabled]="formType === 'details'" class="sortInput" autocomplete="off"
                [(ngModel)]="subItem.lowerLimitRatio">
            </div>
          </td>
          <td>
            <div>
              <input [disabled]="formType === 'details'" class="sortInput" autocomplete="off"
                [(ngModel)]="subItem.upperLimitRatio">
            </div>
          </td>
          <td>
            <button *ngIf="formType !== 'details'" class="add_btn btn_color_primary btn" (click)="addInput(i, j)"
              style="margin-left: 10px;">
              <mat-icon>add</mat-icon> 新增
            </button>
            <button *ngIf="formType !== 'details' && item.inputs.length > 1" class="add_btn btn_color_primary btn" (click)="delInput(i, j)"
              style="margin-left: 10px;">
              <mat-icon>delete</mat-icon> 删除
            </button>
          </td>
        </tr>
      </table>
    </div>
  </div>
</div>


<div class="footer">
  <button *ngIf="formType !== 'details'" (click)="submit()" mat-raised-button color="primary" class="search-btn btn">
    <span>提交</span>
  </button>

  <button style="margin-left: 10px;" [mat-dialog-close]>取消</button>
</div>
