  <div class="login-card">
    <form class="tb-login-form" [formGroup]="loginFormGroup" (ngSubmit)="login()" style="width: 100%;height:100%;padding-top: 42px;">
      <!-- <fieldset [disabled]="isLoading$ | async" fxLayout="column" style="width: 100%;height: 100%;"> -->
        <div class="login-logo"></div>
        <mat-progress-bar color="warn" mode="indeterminate" *ngIf="isLoading$ | async">
        </mat-progress-bar>
        <span style="height: 4px;" *ngIf="!(isLoading$ | async)"></span>
        <div tb-toast fxLayout="column" fxLayoutAlign="start center" class="layout-padding">
          <span style="height: 25px;"></span>

          <!-- 账号 -->
          <mat-form-field style="width: 392px;">
            <mat-label translate>login.account</mat-label>
            <input id="username-input" matInput autofocus formControlName="username" placeholder="请输入账号"/>
            <mat-icon matPrefix>account_circle</mat-icon>
            <!-- <mat-error *ngIf="loginFormGroup.get('username').invalid">
              {{ 'user.invalid-email-format' | translate }}
            </mat-error> -->
          </mat-form-field>
       

          <!-- 密码 -->
          <mat-form-field style="width: 392px;padding-bottom: 0;">
            <mat-label translate>common.password</mat-label>
            <input id="password-input" matInput type="password" formControlName="password" />
            <tb-toggle-password matSuffix></tb-toggle-password>
            <mat-icon matPrefix>lock</mat-icon>
          </mat-form-field>

          <!-- 提交 -->
          <!-- <div fxLayoutAlign="end center" class="forgot-password">
            <button class="tb-reset-password" mat-button type="button" routerLink="/login/resetPasswordRequest">{{
              'login.forgot-password' | translate }}
            </button>
          </div> -->
          <div fxLayout="column" fxLayoutAlign="center center" class="tb-action-button">
            <button mat-raised-button style="width: 392px;
            height: 60px;
            background: #ff993c;
            border-radius: 4px;
            font-size: 20px;font-weight: 500;" [disabled]="(isLoading$ | async)" type="submit">{{ 'login.login' |
              translate }}</button>
          </div>
        </div>

      <!-- </fieldset> -->
    </form>
  </div>
</div>
